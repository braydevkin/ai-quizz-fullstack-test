name: Setup workspace
description: Installs pnpm and Node, restores the pnpm store cache and installs the workspace dependencies.

inputs:
  install:
    description: Whether to run `pnpm install --frozen-lockfile`.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    # No `version` input on purpose: the action reads `packageManager` from the
    # root package.json, so pnpm is pinned in exactly one place.
    - name: Install pnpm
      uses: pnpm/action-setup@v6

    - name: Install Node
      uses: actions/setup-node@v7
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
