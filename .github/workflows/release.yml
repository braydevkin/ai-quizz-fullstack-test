name: Release

# Fires when `develop` lands on `main`. The full CI workflow runs first; only
# then is the version bumped, the changelog written and a GitHub release cut.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    # The release commit is pushed back to `main`; it must not release itself.
    # `[skip ci]` in its message already prevents the run — this is the belt to
    # that pair of braces.
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(repo): release') }}"
    uses: ./.github/workflows/ci.yml

  release:
    name: Tag and publish
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        # Full history and tags: the version and the notes are derived from the
        # commits since the last `v*` tag.
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Resolve the next version
        id: version
        run: .github/scripts/release-version.sh >>"$GITHUB_OUTPUT"

      - name: Report that there is nothing to release
        if: steps.version.outputs.has_changes != 'true'
        env:
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        run: |
          echo "No new commits since $PREVIOUS_TAG — nothing to release." >>"$GITHUB_STEP_SUMMARY"

      # Step outputs go through `env` rather than straight into the script
      # body: they are interpolated before the shell ever sees them, and a tag
      # name is not something to trust that far.
      - name: Generate the release notes
        if: steps.version.outputs.has_changes == 'true'
        env:
          RANGE: ${{ steps.version.outputs.range }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          .github/scripts/release-notes.sh "$RANGE" "$PREVIOUS_TAG" "$TAG" \
            >"$RUNNER_TEMP/release-notes.md"

      - name: Bump the version of every workspace
        if: steps.version.outputs.has_changes == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: .github/scripts/set-version.sh "$VERSION"

      - name: Update the changelog
        if: steps.version.outputs.has_changes == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: .github/scripts/changelog-update.sh "$VERSION" "$RUNNER_TEMP/release-notes.md"

      - name: Format the generated files
        # Keeps the next `pnpm format:check` green — the release commit has to
        # meet the same bar as a hand-written one.
        if: steps.version.outputs.has_changes == 'true'
        run: >-
          pnpm exec prettier --write
          CHANGELOG.md package.json 'apps/*/package.json' 'packages/*/package.json'

      - name: Commit, tag and push
        if: steps.version.outputs.has_changes == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git add CHANGELOG.md package.json apps/*/package.json packages/*/package.json
          git commit -m "chore(repo): release $TAG [skip ci]"
          git tag -a "$TAG" -m "$TAG"
          git push origin HEAD:main
          git push origin "$TAG"

      - name: Publish the GitHub release
        if: steps.version.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --verify-tag \
            --latest

      - name: Fast-forward develop
        # So `develop` carries the bump and the changelog too. It only works
        # while `develop` has not moved on; when it has, the next merge into
        # `main` reconciles the two and this warning can be ignored.
        if: steps.version.outputs.has_changes == 'true'
        run: |
          git push origin HEAD:develop ||
            echo "::warning::develop has moved on — merge main into develop to carry the release commit over"

      - name: Summarise the release
        if: steps.version.outputs.has_changes == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
          BUMP: ${{ steps.version.outputs.bump }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        run: |
          {
            printf '## %s\n\n' "$TAG"
            printf 'Bump: `%s` (previous tag: `%s`)\n\n' "$BUMP" "${PREVIOUS_TAG:-none}"
            cat "$RUNNER_TEMP/release-notes.md"
          } >>"$GITHUB_STEP_SUMMARY"
