name: CI

# Runs on every pull request targeting `develop` or `main`, on every push to
# `develop` (i.e. once a pull request is merged), and as a reusable workflow —
# `release.yml` calls it so nothing is ever released without passing it first.
on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Superseded pull request runs are pointless; a run on `develop` or one
  # gating a release is not — let those finish.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NEXT_TELEMETRY_DISABLED: '1'
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  commits:
    name: Commit messages
    # Only a pull request has a base..head range to lint. Pushes to `develop`
    # carry commits that were already checked on the way in.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup

      - name: Lint commit messages
        run: >-
          pnpm exec commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

  verify:
    name: Format, lint, types, tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup workspace
        uses: ./.github/actions/setup

      # `!cancelled()` on every check so one failure still reports the others,
      # instead of hiding them behind the first red step.
      - name: Check formatting
        if: ${{ !cancelled() }}
        run: pnpm format:check

      - name: Lint
        if: ${{ !cancelled() }}
        run: pnpm lint

      - name: Typecheck
        if: ${{ !cancelled() }}
        run: pnpm typecheck

      - name: Unit tests
        if: ${{ !cancelled() }}
        run: pnpm test:coverage

      - name: Build
        if: ${{ !cancelled() }}
        run: pnpm build

      - name: Upload coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            apps/*/coverage
            packages/*/coverage
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: Integration tests (Playwright)
    # Gated on `verify` so a broken build does not burn browser minutes.
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup workspace
        uses: ./.github/actions/setup

      - name: Restore the Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install the Playwright browsers
        # Always run: the cache holds the browsers, not the system libraries
        # they link against. It is a no-op when both are already present.
        run: pnpm --filter @quiz/web exec playwright install --with-deps

      # Playwright boots the web app itself (`webServer`), and `next dev` does
      # not build workspace dependencies — so @quiz/shared has to exist first.
      - name: Build @quiz/shared
        run: pnpm --filter @quiz/shared build

      - name: Run the integration tests
        run: pnpm test:e2e

      - name: Upload the Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
