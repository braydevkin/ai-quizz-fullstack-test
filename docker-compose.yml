name: ai-quiz-app

services:
  postgres:
    image: postgres:17-alpine
    container_name: quiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quiz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quiz}
      POSTGRES_DB: ${POSTGRES_DB:-quiz}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-quiz} -d ${POSTGRES_DB:-quiz}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - quiz-network

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: quiz-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-quiz}:${POSTGRES_PASSWORD:-quiz}@postgres:5432/${POSTGRES_DB:-quiz}
    ports:
      - '3333:3333'
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://127.0.0.1:3333/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - quiz-network

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        # Baked into the client bundle at build time; must be reachable from the
        # browser, i.e. from the host — not from inside the compose network.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333}
    container_name: quiz-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - '3000:3000'
    networks:
      - quiz-network

volumes:
  postgres-data:
    driver: local

networks:
  quiz-network:
    driver: bridge
