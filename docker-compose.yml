name: ai-quiz-app

services:
  postgres:
    image: postgres:17-alpine
    container_name: quiz-postgres
    restart: unless-stopped
    environment:
      # No fallbacks on purpose: credentials come from the environment (`.env`
      # locally, real secrets in CI/deploy) and compose refuses to start
      # without them, rather than silently booting a known user/password.
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER — copy .env.example to .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD — copy .env.example to .env}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB — copy .env.example to .env}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # `$$` escapes interpolation so the check reads the container's own
      # environment — the values never land in the rendered compose config.
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - quiz-network

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: quiz-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      # Assembled from the same variables Postgres is created with, so the
      # credentials have exactly one source. The root `.env` DATABASE_URL is
      # not reused here: it points at `localhost`, which inside the compose
      # network is the API container itself.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - '3333:3333'
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://127.0.0.1:3333/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - quiz-network

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        # Baked into the client bundle at build time; must be reachable from the
        # browser, i.e. from the host — not from inside the compose network.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333}
    container_name: quiz-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - '3000:3000'
    networks:
      - quiz-network

volumes:
  postgres-data:
    driver: local

networks:
  quiz-network:
    driver: bridge
